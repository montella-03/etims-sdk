name: Release to Maven Central

# Triggers:
#   1. Push a version tag  →  git tag v1.0.0 && git push origin v1.0.0
#   2. Manually from GitHub → Actions tab → "Run workflow"
on:
  push:
    branches:
      - release
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Sign & Publish
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java + inject Sonatype credentials into settings.xml ────
      #   actions/setup-java writes a temporary settings.xml that maps
      #   env vars SONATYPE_USERNAME / SONATYPE_PASSWORD to server "central"
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_PASSWORD

      # ── 3. Import GPG private key ───────────────────────────────────
      #   MAVEN_GPG_PRIVATE_KEY  →  ASCII-armored private key (see README)
      - name: Import GPG key
        run: |
          echo "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long

      # ── 4. Build, sign, and publish ─────────────────────────────────
      - name: Deploy to Maven Central
        run: |
          mvn --no-transfer-progress \
              clean deploy \
              -Prelease \
              -Dgpg.passphrase="${{ secrets.MAVEN_GPG_PASSPHRASE }}"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
